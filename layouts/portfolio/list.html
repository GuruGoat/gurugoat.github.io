{{ define "main" }}
<div class="post">
  <h1 class="post-title">{{ .Title }}</h1>
  
  {{ .Content }}
  
  <div class="posts-list">
    {{ range .Pages }}
      <article class="post-entry">
        {{ if .Params.image }}
          <a href="{{ .Permalink }}">
            <img src="{{ .Params.image }}" alt="{{ .Title }}" style="width: 100%; max-width: 400px; height: auto; margin-bottom: 1rem;">
          </a>
        {{ end }}
        
        <h2 class="post-title">
          <a href="{{ .Permalink }}">{{ .Title }}</a>
        </h2>
        
        {{ if .Description }}
          <p>{{ .Description }}</p>
        {{ end }}
        
        <div class="post-meta">
          <time>{{ .Date.Format "02/01/2006" }}</time>
          {{ if .Params.tags }}
            <span class="post-tags">
              {{ range .Params.tags }}
                <span class="tag">{{ . }}</span>
              {{ end }}
            </span>
          {{ end }}
        </div>
      </article>
    {{ end }}
  </div>
</div>
{{ end }}
