# section information
section:
  name: About
  id: about
  enable: true
  weight: 1
  showOnNavbar: true
  template: sections/about.html

# your designation
designation: Mechanical Engineer

# your company information
#company:
#  name: ""
#  url: ""

# your resume (optional - if you want to offer download)
# resumeLink: /files/resume.pdf

# a summary about you
summary: |
  I'm a mechanical engineer specializing in CAD design, FEA analysis, and manufacturing process optimization. 
  I'm passionate about solving complex engineering challenges through innovative design solutions.

  My expertise spans from initial concept development through prototyping and production. I enjoy working 
  on projects that combine mechanical design with automation and smart manufacturing techniques.

# your social links
# give as many as you want. use font-awesome for the icons.
socialLinks:
  - name: Email
    icon: "fas fa-envelope"
    url: "mailto:your.email@example.com"

#  - name: Github
#    icon: "fab fa-github"
#    url: "https://github.com/yourusername"

  - name: LinkedIn
    icon: "fab fa-linkedin"
    url: "https://linkedin.com/in/yourprofile"

# Show your badges
# You can show your verifiable certificates from https://www.credly.com.
# You can also show a circular bar indicating the level of expertise on a certain skill
badges:
  - type: certification
    name: SolidWorks Certified Professional
    url: "#"
    badge: "https://images.credly.com/size/680x680/images/example.png"

  - type: soft-skill-indicator
    name: CAD Design
    percentage: 95
    color: blue

  - type: soft-skill-indicator
    name: FEA Analysis
    percentage: 85
    color: orange

  - type: soft-skill-indicator
    name: Manufacturing
    percentage: 90
    color: green

# You can also provide a color code instead of using pre-defined colors
